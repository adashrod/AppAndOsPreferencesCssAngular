<div class="pros-and-cons">
    <section>
        <h3>Pros</h3>
        <ul>
            @for (pro of pros; track pro) {
                <li>{{ pro }}</li>
            }
        </ul>
    </section>
    <section>
        <h3>Cons</h3>
        <ul>
            @for (con of cons; track con) {
                <li>{{ con }}</li>
            }
        </ul>
    </section>
</div>
