<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>App and OS preferences in CSS</title>
        <script type="text/javascript">
            // Redirect to index.html with the path preserved for client-side routing
            const pathSegments = window.location.pathname.split("/").filter(Boolean);
            // Remove the repo name from the path if present
            if (pathSegments[0] === "AppAndOsPreferencesCss") {
                pathSegments.shift();
            }
            const redirectPath = "/" + pathSegments.join("/");
            sessionStorage.redirect = redirectPath;
            window.location.href = "/AppAndOsPreferencesCss/";
        </script>
    </head>
    <body>
    </body>
</html>
